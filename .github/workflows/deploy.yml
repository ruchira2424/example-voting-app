name: Voting App CI/CD

on:
  push:
    branches:
      - ruchira-devops-development

env:
  PROJECT_ID: loyal-burner-493907-u6
  REGION: us-central1
  REPOSITORY: voting-app-repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push vote image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/vote:latest ./vote
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/vote:latest

      - name: Build and push result image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/result:latest ./result
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/result:latest

      - name: Build and push worker image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/worker:latest ./worker
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/worker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy vote to Cloud Run
        run: |
          gcloud run deploy vote-dev \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/vote:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --port=80 \
            --allow-unauthenticated

      - name: Deploy result to Cloud Run
        run: |
          gcloud run deploy result-dev \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/result:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --port=80 \
            --allow-unauthenticated

      - name: Deploy worker to Cloud Run
        run: |
          gcloud run deploy worker-dev \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/worker:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Test vote service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vote-dev-768488519065.us-central1.run.app)
          if [ "$STATUS" = "200" ]; then
            echo "Vote service is up!"
          else
            echo "Vote service returned $STATUS"
            exit 1
          fi

      - name: Test result service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://result-dev-768488519065.us-central1.run.app)
          if [ "$STATUS" = "200" ]; then
            echo "Result service is up!"
          else
            echo "Result service returned $STATUS"
            exit 1
          fi

  notify:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()
    steps:
      - name: Send Google Chat Notification
        env:
          WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          JOB_STATUS: ${{ needs.smoke-test.result }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="Deployment successful! Voting App deployed to Cloud Run. Branch: $BRANCH | Triggered by: $ACTOR"
          else
            MSG="Deployment failed! Voting App. Branch: $BRANCH | Triggered by: $ACTOR"
          fi
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"text":"'"$MSG"'"}' \
            "$WEBHOOK_URL"
